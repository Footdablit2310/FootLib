modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
description="Shared API library for FootDablit mods."

# Required dependency: Minecraft
[[dependencies.${mod_id}]]
modId="minecraft"
mandatory=true
versionRange="${minecraft_version_range}"
ordering="NONE"
side="BOTH"

# Required dependency: NeoForge
[[dependencies.${mod_id}]]
modId="neoforge"
type="required"
versionRange="[21.1.200,21.1.300)"
ordering="NONE"
side="BOTH"

# Create
[[dependencies.${mod_id}]]
modId="create"
type="optional"
versionRange="[6.0.10, 6.1.0)"
ordering="AFTER"
side="BOTH"

# JEI(Just Enough Items)
[[dependencies.${mod_id}]]
modId="jei"
type="optional"
versionRange="[19.27.0.300,)"
ordering="NONE"
side="BOTH"
